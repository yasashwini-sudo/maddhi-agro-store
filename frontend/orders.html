<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>My Orders</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#products">Products</a>
    <a href="index.html#about">About</a>

    <span id="userSection"></span>

    <a href="cart.html">
      🛒 (<span id="cartCount">0</span>)
    </a>
  </div>
</div>

<h1 class="section-title">My Orders</h1>

<div id="ordersContainer" class="orders-container"></div>

<script src="script.js"></script>

<script>


async function loadOrders() {

  const container = document.getElementById("ordersContainer");

  if (!container) return;

  container.innerHTML = "Loading...";

  try {
    const res = await fetch(API_URL + "/api/orders");
    const orders = await res.json();

    console.log("ORDERS:", orders);

    if (!orders || orders.length === 0) {
      container.innerHTML = "<h2>No orders yet 🛒</h2>";
      return;
    }

    container.innerHTML = "";

    orders.reverse().forEach(order => {

      let itemsHTML = "";

      if (order.items && order.items.length > 0) {
        order.items.forEach(item => {
          itemsHTML += "<li>" + item.name + " x " + item.quantity + "</li>";
        });
      }

      container.innerHTML +=
        "<div class='order-card'>" +
          "<h3>" + (order.date || "Recent Order") + "</h3>" +
          "<ul>" + itemsHTML + "</ul>" +
          "<h4>Total: ₹" + order.total + "</h4>" +
        "</div>";
    });

  } catch (err) {
    console.error("ERROR:", err);
    container.innerHTML = "Failed to load orders ❌";
  }
}

document.addEventListener("DOMContentLoaded", function () {
  updateNavbar();
  updateCartCount();
  loadOrders();
});

</script>

</body>
</html>
