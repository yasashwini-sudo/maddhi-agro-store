<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>My Orders</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#products">Products</a>
    <a href="index.html#about">About</a>
    <a href="orders.html">My Orders</a>
    <span id="userSection"></span>
    <a href="cart.html">🛒 (<span id="cartCount">0</span>)</a>
  </div>
</div>

<h1 style="text-align:center;">My Orders</h1>

<div id="ordersContainer" style="max-width:800px;margin:40px auto;"></div>

<script src="script.js"></script>

<script>

async function loadOrders() {

  const token = localStorage.getItem("token");

  if (!token) {
    document.getElementById("ordersContainer").innerHTML =
      "<p style='text-align:center;'>Please login to see orders</p>";
    return;
  }

  try {
    const token = localStorage.getItem("token");

const res = await fetch(`${API_URL}/api/orders`, {
  headers: {
    Authorization: "Bearer " + token
  }
});

    const orders = await res.json();

    console.log("ORDERS:", orders); // 🔍 DEBUG

    const container = document.getElementById("ordersContainer");

    if (!orders || orders.length === 0) {
      container.innerHTML = "<p style='text-align:center;'>No orders yet</p>";
      return;
    }

    container.innerHTML = "";

    orders.forEach(order => {
      container.innerHTML += `
        <div style="background:#fff;padding:20px;margin-bottom:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);">
          <p><b>Name:</b> ${order.name}</p>
          <p><b>Phone:</b> ${order.phone}</p>
          <p><b>Total:</b> ₹${order.total}</p>
          <p><b>Date:</b> ${order.date}</p>

          <div style="margin-top:10px;">
            <b>Items:</b>
            ${order.items.map(i => `
              <p>${i.name} x ${i.quantity}</p>
            `).join("")}
          </div>
        </div>
      `;
    });

  } catch (err) {
    console.error("Error loading orders:", err);
  }
}

// CART COUNT
function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let count = 0;
  cart.forEach(i => count += i.quantity);

  const el = document.getElementById("cartCount");
  if (el) el.innerText = count;
}

updateCartCount();
loadOrders();

</script>

</body>
</html>
