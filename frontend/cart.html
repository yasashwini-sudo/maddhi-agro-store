<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#products">Products</a>
    <a href="index.html#about">About</a>

    <a href="orders.html">My Orders</a>
    <span id="userSection"></span>

    <a href="cart.html">🛒 (<span id="cartCount">0</span>)</a>
  </div>
</div>

<!-- CART -->
<div class="cart-container">

  <!-- LEFT -->
  <div>
    <div id="cartItems" class="cart-items"></div>

    <!-- ✅ RECOMMENDED -->
    <h2 class="section-title" style="margin-top:40px;">You may also like</h2>
    <div id="recommended" class="products"></div>
  </div>

  <!-- RIGHT -->
  <div class="cart-summary">
    <h2>Order Summary</h2>

    <p>Total: ₹<span id="cartTotal">0</span></p>

    <button onclick="goToCheckout()">Proceed to Checkout</button>
  </div>

</div>

<script src="script.js"></script>

<script>
// ===== LOAD RECOMMENDED =====
fetch("http://localhost:5000/api/products")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("recommended");
  if (!container) return;

  container.innerHTML = "";

  data.slice(0,4).forEach(p => {
    container.innerHTML += `
      <div class="card" onclick="goToProduct('${p._id}')">
        <img src="http://localhost:5000/uploads/${p.image}">
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
      </div>
    `;
  });
});

// NAV
function goToProduct(id){
  window.location.href = "product.html?id=" + id;
}
</script>

</body>
</html>
