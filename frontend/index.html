<!DOCTYPE html> 
<html>

<head>
<meta charset="UTF-8">
<title>Maddhi Agro Store</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="#products">Products</a>
    <a href="#about">About</a>
    <a href="orders.html">My Orders</a>
    <span id="userSection"></span>
    <a href="cart.html">🛒 (<span id="cartCount">0</span>)</a>
  </div>
</div>

<section class="hero fade-in">
  <div class="hero-content">
    <h1>Pure Cold Pressed Oils</h1>
    <p>Traditional extraction preserving nutrition & purity.</p>
    <button onclick="scrollToProducts()">Explore Products</button>
  </div>
</section>

<h2 class="section-title fade-in">Why Choose Maddhi Agro</h2>

<div class="why-section fade-in">
  <div class="why-card">🌿<h3>100% Natural</h3></div>
  <div class="why-card">🪵<h3>Wood Pressed</h3></div>
  <div class="why-card">❤️<h3>Healthy</h3></div>
  <div class="why-card">🚜<h3>Farm Fresh</h3></div>
</div>

<div class="filters fade-in">
  <button onclick="filterProducts('All'); setActive(this)">All</button>
  <button onclick="filterProducts('Oils'); setActive(this)">Oils</button>
</div>

<h2 class="section-title fade-in" id="products">Our Products</h2>
<div id="productsContainer" class="products fade-in"></div>

<section class="about fade-in" id="about">
  <h2>About Maddhi Agro</h2>
</section>

<!-- ✅ AUTH MODAL (THIS FIXES LOGIN BUTTON) -->
<div id="authModal" class="auth-modal">
  <div class="auth-box">
    <span onclick="closeAuth()">✖</span>
    <h2 id="authTitle">Login</h2>
    <input id="authName" style="display:none;">
    <input id="authEmail">
    <input id="authPassword">
    <button onclick="submitAuth()">Continue</button>
    <p onclick="toggleAuth()">Switch</p>
  </div>
</div>

<!-- POPUP -->
<div id="orderPopup" class="order-popup"></div>

<script src="script.js"></script>

<script>
window.renderProducts = function(products){
  const container = document.getElementById("productsContainer");
  container.innerHTML = "";

  products.forEach(product => {
    container.innerHTML += `
      <div class="card">
        <img src="${getImageUrl(product.image)}">
        <h3>${product.name}</h3>
        <p>₹${product.price}</p>
        <button onclick='addToCart(${JSON.stringify(product)})'>Add</button>
      </div>
    `;
  });
}
</script>

</body>
</html>
