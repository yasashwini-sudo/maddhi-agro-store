<script>

  // ===== RENDER ORDER =====
  function renderOrder() {
  
    const container = document.getElementById("orderItems");
    const subtotalEl = document.getElementById("subtotal");
    const finalEl = document.getElementById("finalTotal");
  
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
  
    if (!cart || cart.length === 0) {
      container.innerHTML = "<p>Your cart is empty</p>";
      subtotalEl.innerText = 0;
      finalEl.innerText = 0;
      return;
    }
  
    container.innerHTML = "";
  
    let subtotal = 0;
  
    cart.forEach(item => {
      const itemTotal = item.price * item.quantity;
      subtotal += itemTotal;
  
      container.innerHTML += `
        <p>${item.name} x ${item.quantity} = ₹${itemTotal}</p>
      `;
    });
  
    let discount = 0;
    const isNewUser = !localStorage.getItem("hasOrdered");
  
    if (isNewUser && subtotal > 0) {
      discount = Math.floor(subtotal * 0.10);
  
      document.getElementById("discountBox").style.display = "flex";
      document.getElementById("discount").innerText = discount;
    }
  
    const finalTotal = subtotal - discount;
  
    subtotalEl.innerText = subtotal;
    finalEl.innerText = finalTotal;
  }
  
  
  // ===== PLACE ORDER =====
  async function placeOrder() {
  
    const token = localStorage.getItem("token");
  
    // 🔴 CHECK LOGIN FIRST
    if (!token) {
      alert("Please login before placing order");
      return;
    }
  
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
  
    if (!name || !phone || !address) {
      alert("Please fill all details");
      return;
    }
  
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
  
    let subtotal = 0;
    cart.forEach(item => subtotal += item.price * item.quantity);
  
    let discount = !localStorage.getItem("hasOrdered")
      ? Math.floor(subtotal * 0.10)
      : 0;
  
    let finalTotal = subtotal - discount;
  
    const order = {
      name,
      phone,
      address,
      items: cart,
      total: finalTotal,
      date: new Date().toLocaleString()
    };
  
    try {
      const res = await fetch(`${API_URL}/api/orders`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: token // ✅ THIS WAS MISSING
        },
        body: JSON.stringify(order)
      });
  
      const data = await res.json();
  
      if (data.success) {
        localStorage.setItem("hasOrdered", "true");
        localStorage.removeItem("cart");
  
        alert("Order Placed Successfully 🎉");
        window.location.href = "index.html";
      } else {
        alert("Order failed ❌");
      }
  
    } catch (err) {
      console.error(err);
      alert("Server error ❌");
    }
  }
  
  // INIT
  renderOrder();
  
  </script>
