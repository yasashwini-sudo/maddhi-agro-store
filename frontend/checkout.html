<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">My Orders</a>
  </div>
</div>

<h1 style="text-align:center;">Checkout</h1>

<div style="max-width:600px;margin:auto">

  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <textarea id="address" placeholder="Address"></textarea><br><br>

  <h3>Order Summary</h3>
  <div id="orderItems"></div>

  <h2>Total: ₹<span id="finalTotal">0</span></h2>

  <button onclick="placeOrder()">Place Order</button>

</div>

<script src="script.js"></script>

<script>

function renderOrder() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const container = document.getElementById("orderItems");

  let total = 0;
  container.innerHTML = "";

  cart.forEach(item => {
    const t = item.price * item.quantity;
    total += t;

    container.innerHTML += `<p>${item.name} x ${item.quantity} = ₹${t}</p>`;
  });

  document.getElementById("finalTotal").innerText = total;
}

async function placeOrder() {

const token = localStorage.getItem("token"); // ✅ FIX

if (!token) {
  alert("Please login first");
  return;
}

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const address = document.getElementById("address").value.trim();

if (!name || !phone || !address) {
  alert("Please fill all details");
  return;
}

const cart = JSON.parse(localStorage.getItem("cart")) || [];

if (!cart.length) {
  alert("Your cart is empty");
  return;
}

let subtotal = 0;
cart.forEach(item => {
  subtotal += (item.price || 0) * (item.quantity || 0);
});

const discount = !localStorage.getItem("hasOrdered")
  ? Math.floor(subtotal * 0.10)
  : 0;

const finalTotal = subtotal - discount;

const order = {
  name,
  phone,
  address,
  items: cart,
  total: finalTotal,
  date: new Date().toLocaleString()
};

console.log("ORDER:", order); // debug

try {
  const res = await fetch(`${API_URL}/api/orders`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token // ✅ FIX
    },
    body: JSON.stringify(order)
  });

  const data = await res.json();

  if (res.ok && data.success) {
    localStorage.setItem("hasOrdered", "true");
    localStorage.removeItem("cart");

    alert("Order Placed Successfully 🎉");
    window.location.href = "index.html";
  } else {
    alert(data.msg || "Order failed ❌");
  }

} catch (err) {
  console.error("Order error:", err);
  alert("Server error ❌");
}
}

renderOrder();

</script>

</body>
</html>
