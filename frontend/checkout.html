<script>
  function renderOrder() {
    const container = document.getElementById("orderItems");
    const subtotalEl = document.getElementById("subtotal");
    const finalEl = document.getElementById("finalTotal");
    const discountBox = document.getElementById("discountBox");
    const discountEl = document.getElementById("discount");
  
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
  
    if (!cart.length) {
      container.innerHTML = "<p>Your cart is empty</p>";
      subtotalEl.innerText = 0;
      finalEl.innerText = 0;
      return;
    }
  
    container.innerHTML = "";
    let subtotal = 0;
  
    cart.forEach(item => {
      const itemTotal = item.price * item.quantity;
      subtotal += itemTotal;
  
      container.innerHTML += `
        <p>${item.name} x ${item.quantity} = ₹${itemTotal}</p>
      `;
    });
  
    let discount = 0;
    const isNewUser = !localStorage.getItem("hasOrdered");
  
    if (isNewUser) {
      discount = Math.floor(subtotal * 0.10);
      discountBox.style.display = "flex";
      discountEl.innerText = discount;
    }
  
    const finalTotal = subtotal - discount;
  
    subtotalEl.innerText = subtotal;
    finalEl.innerText = finalTotal;
  }
  
  // ===== PLACE ORDER =====
  async function placeOrder() {
  
    const token = localStorage.getItem("token"); // ✅ FIX
  
    if (!token) {
      alert("Please login first");
      return;
    }
  
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
  
    if (!name || !phone || !address) {
      alert("Please fill all details");
      return;
    }
  
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
  
    if (!cart.length) {
      alert("Your cart is empty");
      return;
    }
  
    let subtotal = 0;
    cart.forEach(item => subtotal += item.price * item.quantity);
  
    const discount = !localStorage.getItem("hasOrdered")
      ? Math.floor(subtotal * 0.10)
      : 0;
  
    const finalTotal = subtotal - discount;
  
    const order = {
      name,
      phone,
      address,
      items: cart,
      total: finalTotal,
      date: new Date().toLocaleString()
    };
  
    console.log("SENDING ORDER:", order); // 🔍 DEBUG
  
    try {
      const res = await fetch(`${API_URL}/api/orders`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token // ✅ FIXED
        },
        body: JSON.stringify(order)
      });
  
      const data = await res.json();
  
      if (res.ok && data.success) {
        localStorage.setItem("hasOrdered", "true");
        localStorage.removeItem("cart");
  
        alert("Order Placed Successfully 🎉");
        window.location.href = "index.html";
      } else {
        alert(data.msg || "Order failed ❌");
      }
  
    } catch (err) {
      console.error("ORDER ERROR:", err);
      alert("Server error ❌");
    }
  }
  
  renderOrder();
  </script>
