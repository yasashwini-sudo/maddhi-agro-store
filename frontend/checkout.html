<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">My Orders</a>
    <span id="userSection"></span>
  </div>
</div>

<h1 style="text-align:center; margin-top:20px;">Checkout</h1>

<div class="checkout-container">

  <!-- LEFT SIDE -->
  <div class="checkout-left">
    <h2>Delivery Details</h2>

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <textarea id="address" placeholder="Address"></textarea>
  </div>

  <!-- RIGHT SIDE -->
  <div class="checkout-right">
    <div class="summary-box">

      <h2>Order Summary</h2>
    
      <div id="orderItems"></div>
    
      <div class="price-breakdown">
        <p>Subtotal: ₹<span id="subtotal">0</span></p>
        <p style="color:green;">Discount (10%): -₹<span id="discount">0</span></p>
        <h2>Total: ₹<span id="finalTotal">0</span></h2>
      </div>
    
      <div id="offerMsg"></div>
    
      <select id="payment">
        <option>Cash on Delivery</option>
        <option>UPI</option>
        <option>Card</option>
      </select>
    
      <button onclick="placeOrder()">Place Order</button>
    
    </div>
  </div>

</div>

<!-- ================= PREMIUM AUTH MODAL ================= -->
<div id="authModal" class="auth-modal">

  <div class="auth-box">

    <span class="close-btn" onclick="closeAuth()">✖</span>

    <h2 id="authTitle">Login</h2>

    <input id="authName" placeholder="Your Name" style="display:none;">
    <input id="authEmail" placeholder="Email Address">
    <input id="authPassword" type="password" placeholder="Password">

    <button class="auth-btn" onclick="submitAuth()">Continue</button>

    <p class="switch-text" onclick="toggleAuth()">
      Don't have an account? Signup
    </p>

  </div>

</div>

<script src="script.js"></script>

<script>

  // =======================
  // CHECK LOGIN (UPDATED UX)
  // =======================
  const token = localStorage.getItem("token");

  if (!token) {
    openAuth(); // 🔥 open modal instead of redirect
  }

  // =======================
  // RENDER ORDER
  // =======================
  function renderOrder() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const container = document.getElementById("orderItems");

    let subtotal = 0;
    container.innerHTML = "";

    cart.forEach(item => {
      const t = item.price * item.quantity;
      subtotal += t;

      container.innerHTML += `<p>${item.name} x ${item.quantity} = ₹${t}</p>`;
    });

    let discount = !localStorage.getItem("hasOrdered")
      ? Math.floor(subtotal * 0.10)
      : 0;

    let finalTotal = subtotal - discount;

    if (!localStorage.getItem("hasOrdered")) {
  document.getElementById("offerMsg").innerText =
    "🎉 First Order Offer Applied (10% OFF)";
}

    document.getElementById("subtotal").innerText = subtotal;
document.getElementById("discount").innerText = discount;
document.getElementById("finalTotal").innerText = finalTotal;
  }


  // =======================
  // PLACE ORDER (UPDATED)
  // =======================
  async function placeOrder() {

    const token = localStorage.getItem("token");

    if (!token) {
      openAuth(); // 🔥 no redirect
      return;
    }

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const payment = document.getElementById("payment").value;

    if (!name || !phone || !address) {
      alert("Please fill all details");
      return;
    }

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (!cart.length) {
      alert("Your cart is empty");
      return;
    }

    let subtotal = 0;
    cart.forEach(item => {
      subtotal += item.price * item.quantity;
    });

    let discount = !localStorage.getItem("hasOrdered")
      ? Math.floor(subtotal * 0.10)
      : 0;

    let finalTotal = subtotal - discount;

    const order = {
      name,
      phone,
      address,
      items: cart,
      total: finalTotal,
      payment,
      date: new Date().toLocaleString()
    };

    try {

      const res = await fetch(`${API_URL}/api/orders`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token
        },
        body: JSON.stringify(order)
      });

      const data = await res.json();

      if (res.ok) {

        localStorage.setItem("hasOrdered", "true");
        localStorage.removeItem("cart");

        alert("Order Placed Successfully 🎉");
        window.location.href = "index.html";

      } else {
        alert(data.msg || "Order failed ❌");
      }

    } catch (err) {
      console.error("Order error:", err);
      alert("Server error ❌");
    }
  }


  // =======================
  // AUTO-FILL USER
  // =======================
  const user = JSON.parse(localStorage.getItem("user"));

  if (user) {
    document.getElementById("name").value = user.name || "";
  }

  // INIT
  renderOrder();

</script>
</body>
</html>
