<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">My Orders</a>
  </div>
</div>

<h1 style="text-align:center;">Checkout</h1>

<div style="max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1)">

  <input id="name" placeholder="Name" style="width:100%;margin-bottom:10px;padding:10px;">
  <input id="phone" placeholder="Phone" style="width:100%;margin-bottom:10px;padding:10px;">
  <textarea id="address" placeholder="Address" style="width:100%;margin-bottom:10px;padding:10px;"></textarea>

  <h3>Order Summary</h3>
  <div id="orderItems"></div>

  <h2>Total: ₹<span id="finalTotal">0</span></h2>

  <button onclick="placeOrder()" style="width:100%;padding:12px;background:#2e7d32;color:white;border:none;border-radius:8px;cursor:pointer;">
    Place Order
  </button>

</div>

<script src="script.js"></script>

<script>
function renderOrder() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const container = document.getElementById("orderItems");

  let total = 0;
  container.innerHTML = "";

  cart.forEach(item => {
    const t = item.price * item.quantity;
    total += t;

    container.innerHTML += `<p>${item.name} x ${item.quantity} = ₹${t}</p>`;
  });

  document.getElementById("finalTotal").innerText = total;
}

async function placeOrder() {

  const token = localStorage.getItem("token");

  if (!token) {
    alert("Please login first");
    return;
  }

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();

  if (!name || !phone || !address) {
    alert("Fill all details");
    return;
  }

  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  const order = {
    name,
    phone,
    address,
    items: cart,
    total: cart.reduce((a, b) => a + b.price * b.quantity, 0),
    date: new Date().toLocaleString()
  };

  try {
    const res = await fetch(`${API_URL}/api/orders`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify(order)
    });

    const data = await res.json();

    if (data.success) {
      alert("Order placed 🎉");
      localStorage.removeItem("cart");
      window.location.href = "orders.html";
    } else {
      alert("Order failed");
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}

renderOrder();
</script>

</body>
</html>
