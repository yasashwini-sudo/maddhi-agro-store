<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      margin: 0;
    }

    /* NAVBAR */
    .navbar {
      background: linear-gradient(90deg, #1b5e20, #2e7d32);
      color: white;
      padding: 18px 30px;
      font-size: 20px;
      font-weight: 600;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin: 30px 0 10px;
      color: #222;
    }

    /* SECTION WRAPPER */
    .section {
      max-width: 1000px;
      margin: 20px auto;
    }

    /* STATS */
    #statsBar {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .stat-card {
      background: white;
      padding: 18px 28px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      text-align: center;
      min-width: 140px;
    }

    .stat-title {
      font-size: 13px;
      color: #777;
    }

    .stat-value {
      font-size: 20px;
      font-weight: bold;
      margin-top: 5px;
    }

    /* CHART */
    .chart-box {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    /* CONTROLS */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .filters button {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: #e0e0e0;
      cursor: pointer;
      transition: 0.2s;
    }

    .filters button:hover {
      background: #d5d5d5;
    }

    .filters button.active {
      background: #2e7d32;
      color: white;
    }

    .controls input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .top-actions button {
      padding: 9px 16px;
      border-radius: 10px;
      border: none;
      background: #2e7d32;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .top-actions button:hover {
      background: #1b5e20;
    }

    /* ORDERS */
    #ordersContainer {
      max-width: 1000px;
      margin: auto;
    }

    .order-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: 0.2s;
    }

    .order-card:hover {
      transform: translateY(-2px);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .pending { background: #ffe5e5; color: #d32f2f; }
    .shipped { background: #fff3cd; color: #f57c00; }
    .delivered { background: #e6ffed; color: #2e7d32; }

    .order-info {
      margin-top: 10px;
      color: #555;
      line-height: 1.5;
    }

    .action-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select {
      padding: 7px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .delete-btn {
      background: #e53935;
      color: white;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #c62828;
    }

  </style>
</head>

<body>

<div class="navbar">Maddhi Agro 🌿 Admin</div>

<h1>Admin Dashboard</h1>

<div class="section">
  <div id="statsBar"></div>
</div>

<div class="section chart-box">
  <canvas id="revenueChart"></canvas>
</div>

<div class="section controls">
  <div class="filters">
    <button onclick="setActive(this);filterStatus('All')">All</button>
    <button onclick="setActive(this);filterStatus('Pending')">Pending</button>
    <button onclick="setActive(this);filterStatus('Shipped')">Shipped</button>
    <button onclick="setActive(this);filterStatus('Delivered')">Delivered</button>
  </div>

  <input type="date" onchange="filterByDate(this.value)">
  <input type="text" placeholder="Search..." oninput="searchOrders(this.value)">

  <div class="top-actions">
    <button onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<div id="ordersContainer"></div>

<script>

const API_URL = "https://maddhi-agro-store.onrender.com";

let allOrders = [];
let filteredOrders = [];
let chart;

function setActive(btn){
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

async function loadOrders(){
  const token = localStorage.getItem("token");
  const res = await fetch(`${API_URL}/api/orders/admin/all`,{
    headers:{Authorization:"Bearer "+token}
  });

  const orders = await res.json();

  allOrders = orders;
  filteredOrders = orders;

  updateStats(orders);
  renderOrders(orders);
  renderChart(orders);
}

function updateStats(orders){
  let total=0,pending=0;
  orders.forEach(o=>{
    total+=o.total||0;
    if(o.status==="Pending") pending++;
  });

  document.getElementById("statsBar").innerHTML=`
    <div class="stat-card">
      <div class="stat-title">Orders</div>
      <div class="stat-value">${orders.length}</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Revenue</div>
      <div class="stat-value">₹${total}</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Pending</div>
      <div class="stat-value">${pending}</div>
    </div>
  `;
}

function renderChart(orders){
  const ctx=document.getElementById("revenueChart");

  const monthly={};
  orders.forEach(o=>{
    const m=new Date(o.date).toLocaleString("default",{month:"short"});
    monthly[m]=(monthly[m]||0)+(o.total||0);
  });

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:Object.keys(monthly),
      datasets:[{
        label:'Monthly Revenue',
        data:Object.values(monthly),
        borderRadius:6
      }]
    }
  });
}

function renderOrders(orders){
  const c=document.getElementById("ordersContainer");
  c.innerHTML="";

  orders.forEach(o=>{
    c.innerHTML+=`
      <div class="order-card">
        <div class="order-header">
          <b>${o.name}</b>
          <span class="status ${o.status.toLowerCase()}">${o.status}</span>
        </div>

        <div class="order-info">
          <p>📞 ${o.phone}</p>
          <p>📍 ${o.address}</p>
          <p><b>₹${o.total}</b></p>
        </div>

        <div class="action-row">
          <select onchange="updateStatus('${o._id}',this)">
            <option ${o.status==='Pending'?'selected':''}>Pending</option>
            <option ${o.status==='Shipped'?'selected':''}>Shipped</option>
            <option ${o.status==='Delivered'?'selected':''}>Delivered</option>
          </select>

          <button onclick="showInvoice('${o._id}')">Invoice</button>
          <button class="delete-btn" onclick="deleteOrder('${o._id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

function showInvoice(id){
  const o = allOrders.find(x=>x._id===id);
  const win = window.open("", "", "width=400,height=600");

  win.document.write(`
    <h2>Invoice</h2>
    <p>${o.name}</p>
    <p>${o.phone}</p>
    <p>Total ₹${o.total}</p>
    <p>Status ${o.status}</p>
  `);
}

function exportCSV(){
  let csv="Name,Phone,Total,Status\n";
  allOrders.forEach(o=>{
    csv+=`${o.name},${o.phone},${o.total},${o.status}\n`;
  });

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="orders.csv";
  a.click();
}

function filterStatus(s){
  filteredOrders=s==="All"?allOrders:allOrders.filter(o=>o.status===s);
  renderOrders(filteredOrders);
  renderChart(filteredOrders);
}

function searchOrders(q){
  q=q.toLowerCase();
  filteredOrders=allOrders.filter(o=>o.name.toLowerCase().includes(q));
  renderOrders(filteredOrders);
  renderChart(filteredOrders);
}

function filterByDate(d){
  filteredOrders=allOrders.filter(o=>new Date(o.date).toISOString().split("T")[0]===d);
  renderOrders(filteredOrders);
  renderChart(filteredOrders);
}

async function updateStatus(id,el){
  const token = localStorage.getItem("token");

  await fetch(`${API_URL}/api/orders/admin/update/${id}`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({status:el.value})
  });

  loadOrders();
}

async function deleteOrder(id){
  if(!confirm("Delete?")) return;

  const token = localStorage.getItem("token");

  await fetch(`${API_URL}/api/orders/admin/delete/${id}`,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });

  loadOrders();
}

loadOrders();

</script>

</body>
</html>
