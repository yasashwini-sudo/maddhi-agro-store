<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>
</div>

<h1 style="text-align:center;">Admin Dashboard</h1>

<div id="ordersContainer" style="max-width:900px;margin:auto;"></div>

<script>

const API_URL = "https://maddhi-agro-store.onrender.com";

// ===============================
// LOAD ORDERS
// ===============================
async function loadOrders() {
  const res = await fetch(${API_URL}/api/orders/admin/all);
  const orders = await res.json();

  const container = document.getElementById("ordersContainer");
  container.innerHTML = "";

  orders.forEach(order => {

    let itemsHTML = "";
    order.items.forEach(item => {
      itemsHTML += <p>${item.name} x ${item.quantity}</p>;
    });

    const statusColor =
      order.status === "Delivered" ? "green" :
      order.status === "Shipped" ? "orange" : "red";

    container.innerHTML += `
      <div style="border:1px solid #ddd;padding:15px;margin:10px 0;border-radius:10px;">
        
        <h3>${order.name}</h3>
        <p>${order.phone}</p>
        <p>${order.address}</p>

        <p><b>Total:</b> ₹${order.total}</p>

        <p>
          <b>Status:</b> 
          <span style="color:${statusColor};font-weight:bold;">
            ${order.status || "Pending"}
          </span>
        </p>

        <select onchange="updateStatus('${order._id}', this.value)">
          <option value="">Change Status</option>
          <option>Pending</option>
          <option>Shipped</option>
          <option>Delivered</option>
        </select>

        <button onclick="deleteOrder('${order._id}')" style="margin-left:10px;background:red;color:white;border:none;padding:5px 10px;border-radius:5px;">
          Delete
        </button>

        <h4>Items:</h4>
        ${itemsHTML}

      </div>
    `;
  });
}


// ===============================
// UPDATE STATUS
// ===============================
async function updateStatus(id, status) {
  await fetch(${API_URL}/api/orders/admin/update/${id}, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  loadOrders(); // refresh
}


// ===============================
// DELETE ORDER
// ===============================
async function deleteOrder(id) {
  if (!confirm("Delete this order?")) return;

  await fetch(${API_URL}/api/orders/admin/delete/${id}, {
    method: "DELETE"
  });

  loadOrders();
}


loadOrders();

</script>

</body>
</html>
