<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      margin: 0;
    }

    .navbar {
      background: linear-gradient(90deg, #2e7d32, #43a047);
      color: white;
      padding: 18px 25px;
      font-size: 20px;
      font-weight: 600;
    }

    h1 {
      text-align: center;
      margin: 25px 0;
      color: #333;
    }

    #statsBar {
      max-width: 1000px;
      margin: 20px auto;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .stat-card {
      background: white;
      padding: 15px 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      font-weight: 500;
    }

    #ordersContainer {
      max-width: 1000px;
      margin: auto;
    }

    .order-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: 0.2s;
    }

    .order-card:hover {
      transform: translateY(-2px);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-name {
      font-size: 18px;
      font-weight: 600;
    }

    .status {
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .pending { background: #ffe5e5; color: #d32f2f; }
    .shipped { background: #fff3cd; color: #f57c00; }
    .delivered { background: #e6ffed; color: #2e7d32; }

    .order-info {
      margin-top: 10px;
      color: #555;
    }

    .action-row {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    select {
      padding: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .delete-btn {
      background: #ff4d4d;
      color: white;
    }

    .delete-btn:hover {
      background: #e53935;
    }

    .items {
      margin-top: 10px;
      background: #fafafa;
      padding: 10px;
      border-radius: 10px;
    }

    .center-msg {
      text-align: center;
      margin-top: 40px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="navbar">
  Maddhi Agro 🌿 Admin
</div>

<h1>Admin Dashboard</h1>

<!-- 🔥 STATS BAR -->
<div id="statsBar"></div>

<div id="ordersContainer"></div>

<script>

const API_URL = "https://maddhi-agro-store.onrender.com";


// ===============================
// LOAD ORDERS
// ===============================
async function loadOrders() {
  const container = document.getElementById("ordersContainer");
  const statsBar = document.getElementById("statsBar");

  container.innerHTML = "<p class='center-msg'>Loading orders...</p>";

  try {
    const token = localStorage.getItem("token");

    if (!token) {
      container.innerHTML = "<p class='center-msg'>Please login first</p>";
      return;
    }

    const res = await fetch(`${API_URL}/api/orders/admin/all`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (res.status === 401) {
      container.innerHTML = "<p class='center-msg'>Session expired. Redirecting...</p>";
      localStorage.removeItem("token");
      setTimeout(() => window.location.href = "index.html", 1500);
      return;
    }

    if (!res.ok) {
      container.innerHTML = "<p class='center-msg'>Failed to load orders</p>";
      return;
    }

    const orders = await res.json();
    container.innerHTML = "";

    // 🔥 Update heading
    document.querySelector("h1").innerText = `Admin Dashboard (${orders.length} Orders)`;

    // 🔥 Stats Calculation
    let totalRevenue = 0;
    let pending = 0;

    orders.forEach(o => {
      totalRevenue += o.total || 0;
      if (o.status === "Pending") pending++;
    });

    statsBar.innerHTML = `
      <div class="stat-card">📦 Orders: <b>${orders.length}</b></div>
      <div class="stat-card">💰 Revenue: <b>₹${totalRevenue}</b></div>
      <div class="stat-card">⏳ Pending: <b>${pending}</b></div>
    `;

    if (!orders.length) {
      container.innerHTML = "<p class='center-msg'>No orders found</p>";
      return;
    }

    orders.forEach(order => {
      let itemsHTML = "";
      (order.items || []).forEach(item => {
        itemsHTML += `<p>${item.name} x ${item.quantity}</p>`;
      });

      const statusClass = (order.status || "pending").toLowerCase();

      container.innerHTML += `
        <div class="order-card">

          <div class="order-header">
            <div class="order-name">${order.name}</div>
            <div class="status ${statusClass}">
              ${order.status || "Pending"}
            </div>
          </div>

          <div class="order-info">
            <p>📞 ${order.phone}</p>
            <p>📍 ${order.address}</p>
            <p><b>Total:</b> ₹${order.total}</p>
          </div>

          <div class="action-row">
            <select onchange="updateStatus('${order._id}', this)">
              <option value="">Change Status</option>
              <option>Pending</option>
              <option>Shipped</option>
              <option>Delivered</option>
            </select>

            <button class="delete-btn" onclick="deleteOrder('${order._id}')">
              Delete
            </button>
          </div>

          <div class="items">
            <b>Items:</b>
            ${itemsHTML}
          </div>

        </div>
      `;
    });

  } catch (err) {
    console.error("Load Orders Error:", err);
    container.innerHTML = "<p class='center-msg'>Something went wrong</p>";
  }
}


// ===============================
// UPDATE STATUS
// ===============================
async function updateStatus(id, selectEl) {
  const status = selectEl.value;
  if (!status) return;

  selectEl.disabled = true;

  try {
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/orders/admin/update/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ status })
    });

    if (!res.ok) {
      alert("Failed to update status");
    }

    loadOrders();

  } catch (err) {
    console.error("Update error:", err);
  }
}


// ===============================
// DELETE ORDER
// ===============================
async function deleteOrder(id) {
  if (!confirm("Are you sure you want to delete this order?")) return;

  try {
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/orders/admin/delete/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!res.ok) {
      alert("Delete failed");
    }

    loadOrders();

  } catch (err) {
    console.error("Delete error:", err);
  }
}


// INIT
loadOrders();

</script>

</body>
</html>
