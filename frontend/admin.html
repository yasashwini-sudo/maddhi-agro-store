<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
    }

    .navbar {
      background: #2e7d32;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    .order-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .status {
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 6px;
    }

    .pending { background: #ffe5e5; color: red; }
    .shipped { background: #fff3cd; color: orange; }
    .delivered { background: #e6ffed; color: green; }

    .action-row {
      margin-top: 10px;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .delete-btn {
      background: #ff4d4d;
      color: white;
    }

    select {
      padding: 5px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="navbar">
  Maddhi Agro 🌿 Admin
</div>

<h1>Admin Dashboard</h1>

<div id="ordersContainer" style="max-width:900px;margin:auto;"></div>

<script>

const API_URL = "https://maddhi-agro-store.onrender.com";


// ===============================
// LOAD ORDERS
// ===============================
async function loadOrders() {
  try {
    const res = await fetch(`${API_URL}/api/orders/admin/all`);

    if (!res.ok) {
      console.error("API failed");
      return;
    }

    const orders = await res.json();

    const container = document.getElementById("ordersContainer");
    container.innerHTML = "";

    if (!orders || orders.length === 0) {
      container.innerHTML = "<p style='text-align:center;'>No orders found</p>";
      return;
    }

    orders.forEach(order => {

      let itemsHTML = "";

      (order.items || []).forEach(item => {
        itemsHTML += `<p>${item.name} x ${item.quantity}</p>`;
      });

      container.innerHTML += `
        <div class="order-card">

          <h3>${order.name}</h3>
          <p>${order.phone}</p>
          <p>${order.address}</p>

          <p><b>Total:</b> ₹${order.total}</p>

          <p>
            <b>Status:</b>
            <span class="status ${order.status?.toLowerCase()}">
              ${order.status || "Pending"}
            </span>
          </p>

          <div class="action-row">
            <select onchange="updateStatus('${order._id}', this.value)">
              <option value="">Change Status</option>
              <option>Pending</option>
              <option>Shipped</option>
              <option>Delivered</option>
            </select>

            <button class="delete-btn" onclick="deleteOrder('${order._id}')">
              Delete
            </button>
          </div>

          <h4>Items:</h4>
          ${itemsHTML}

        </div>
      `;
    });

  } catch (err) {
    console.error("Load Orders Error:", err);
  }
}


// ===============================
// UPDATE STATUS (FIXED)
// ===============================
async function updateStatus(id, status) {
  try {
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/orders/admin/update/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        ...(token && { "Authorization": "Bearer " + token })
      },
      body: JSON.stringify({ status })
    });

    if (!res.ok) {
      console.error("Update failed");
      return;
    }

    loadOrders();

  } catch (err) {
    console.error("Update error:", err);
  }
}


// ===============================
// DELETE ORDER (FIXED)
// ===============================
async function deleteOrder(id) {
  if (!confirm("Delete this order?")) return;

  try {
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/orders/admin/delete/${id}`, {
  method: "DELETE",
  headers: {
    ...(token && { "Authorization": "Bearer " + token })
  }
});

    if (res.status === 401) {
      alert("Session expired. Please login again.");
      localStorage.removeItem("token");
      window.location.href = "index.html";
      return;
    }

    loadOrders();

  } catch (err) {
    console.error("Delete error:", err);
  }
}


// INIT
loadOrders();

</script>

</body>
</html>
