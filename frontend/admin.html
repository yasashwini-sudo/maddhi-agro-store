<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      margin: 0;
    }

    .navbar {
      background: linear-gradient(90deg, #2e7d32, #43a047);
      color: white;
      padding: 18px 25px;
      font-size: 20px;
      font-weight: 600;
    }

    h1 {
      text-align: center;
      margin: 25px 0;
      color: #333;
    }

    #statsBar {
      max-width: 1000px;
      margin: 20px auto;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .stat-card {
      background: white;
      padding: 15px 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      font-weight: 500;
    }

    .controls {
      max-width: 1000px;
      margin: 20px auto;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .controls button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #eee;
    }

    .controls button:hover {
      background: #ddd;
    }

    .controls input {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 250px;
    }

    #ordersContainer {
      max-width: 1000px;
      margin: auto;
    }

    .order-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: 0.2s;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
    }

    .pending { background: #ffe5e5; color: red; }
    .shipped { background: #fff3cd; color: orange; }
    .delivered { background: #e6ffed; color: green; }

    .action-row {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    .delete-btn {
      background: red;
      color: white;
    }

    .items {
      margin-top: 10px;
      background: #fafafa;
      padding: 10px;
      border-radius: 10px;
    }

    .center-msg {
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="navbar">Maddhi Agro 🌿 Admin</div>

<h1>Admin Dashboard</h1>

<div id="statsBar"></div>

<!-- 🔥 CONTROLS -->
<div class="controls">
  <div>
    <button onclick="filterStatus('All')">All</button>
    <button onclick="filterStatus('Pending')">Pending</button>
    <button onclick="filterStatus('Shipped')">Shipped</button>
    <button onclick="filterStatus('Delivered')">Delivered</button>
  </div>

  <input type="text" placeholder="Search..." oninput="searchOrders(this.value)">
</div>

<div id="ordersContainer"></div>

<script>

const API_URL = "https://maddhi-agro-store.onrender.com";

let allOrders = [];
let filteredOrders = [];


// ===============================
// LOAD ORDERS
// ===============================
async function loadOrders() {
  const container = document.getElementById("ordersContainer");
  const statsBar = document.getElementById("statsBar");

  container.innerHTML = "<p class='center-msg'>Loading...</p>";

  try {
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/orders/admin/all`, {
      headers: { "Authorization": "Bearer " + token }
    });

    const orders = await res.json();

    allOrders = orders;
    filteredOrders = orders;

    document.querySelector("h1").innerText =
      `Admin Dashboard (${orders.length} Orders)`;

    let total = 0, pending = 0;

    orders.forEach(o => {
      total += o.total || 0;
      if (o.status === "Pending") pending++;
    });

    statsBar.innerHTML = `
      <div class="stat-card">📦 ${orders.length}</div>
      <div class="stat-card">💰 ₹${total}</div>
      <div class="stat-card">⏳ ${pending}</div>
    `;

    renderOrders(filteredOrders);

  } catch (err) {
    console.error(err);
  }
}


// ===============================
// RENDER ORDERS
// ===============================
function renderOrders(orders) {
  const container = document.getElementById("ordersContainer");
  container.innerHTML = "";

  if (!orders.length) {
    container.innerHTML = "<p class='center-msg'>No results</p>";
    return;
  }

  orders.forEach(order => {
    let itemsHTML = "";
    (order.items || []).forEach(i => {
      itemsHTML += `<p>${i.name} x ${i.quantity}</p>`;
    });

    const statusClass = order.status.toLowerCase();

    container.innerHTML += `
      <div class="order-card">

        <div class="order-header">
          <b>${order.name}</b>
          <span class="status ${statusClass}">${order.status}</span>
        </div>

        <p>📞 ${order.phone}</p>
        <p>📍 ${order.address}</p>
        <p><b>₹${order.total}</b></p>

        <div class="action-row">
          <select onchange="updateStatus('${order._id}', this)">
            <option>Pending</option>
            <option ${order.status==='Shipped'?'selected':''}>Shipped</option>
            <option ${order.status==='Delivered'?'selected':''}>Delivered</option>
          </select>

          <button class="delete-btn" onclick="deleteOrder('${order._id}')">Delete</button>
        </div>

        <div class="items">${itemsHTML}</div>
      </div>
    `;
  });
}


// ===============================
// FILTER
// ===============================
function filterStatus(status) {
  filteredOrders = status === "All"
    ? allOrders
    : allOrders.filter(o => o.status === status);

  renderOrders(filteredOrders);
}


// ===============================
// SEARCH
// ===============================
function searchOrders(q) {
  q = q.toLowerCase();

  filteredOrders = allOrders.filter(o =>
    o.name.toLowerCase().includes(q) ||
    o.phone.includes(q)
  );

  renderOrders(filteredOrders);
}


// ===============================
// UPDATE
// ===============================
async function updateStatus(id, el) {
  const status = el.value;
  const token = localStorage.getItem("token");

  await fetch(`${API_URL}/api/orders/admin/update/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ status })
  });

  loadOrders();
}


// ===============================
// DELETE
// ===============================
async function deleteOrder(id) {
  if (!confirm("Delete?")) return;

  const token = localStorage.getItem("token");

  await fetch(`${API_URL}/api/orders/admin/delete/${id}`, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + token }
  });

  loadOrders();
}


// INIT
loadOrders();

</script>

</body>
</html>
