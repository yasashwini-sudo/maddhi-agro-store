<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ✅ NAVBAR (kept clean) -->
<div class="navbar">
  <div class="logo">Maddhi Agro 🌿</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#products">Products</a>
    <a href="index.html#about">About</a>
  </div>
</div>

<h1 style="text-align:center;">Admin - All Orders</h1>

<div id="ordersContainer" style="max-width:800px;margin:auto;"></div>

<script>

const API_URL = "https://YOUR_BACKEND_URL"; // 🔥 PUT YOUR BACKEND URL HERE

async function loadOrders() {
  try {
    const res = await fetch(`${API_URL}/api/orders`);
    const orders = await res.json();

    const container = document.getElementById("ordersContainer");

    if (!orders || orders.length === 0) {
      container.innerHTML = "<p style='text-align:center;'>No orders yet</p>";
      return;
    }

    container.innerHTML = "";

    orders.forEach(order => {

      let itemsHTML = "";

      order.items.forEach(item => {
        itemsHTML += `<p>${item.name} x ${item.quantity}</p>`;
      });

      container.innerHTML += `
        <div style="border:1px solid #ddd;padding:15px;margin:10px 0;border-radius:10px;">
          <h3>${order.name}</h3>
          <p>${order.phone}</p>
          <p>${order.address}</p>
          <p><b>Total:</b> ₹${order.total}</p>
          <p><b>Date:</b> ${order.date}</p>

          <h4>Items:</h4>
          ${itemsHTML}
        </div>
      `;
    });

  } catch (err) {
    console.error("Error loading orders:", err);
  }
}

loadOrders();

</script>

</body>
</html>
